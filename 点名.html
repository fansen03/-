<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随机点名（本地头像+本地音乐）</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:"微软雅黑",sans-serif;
    }
    body{
        background:#e6f7ff;
        padding:30px;
        text-align:center;
    }

    /* 按钮 */
    .btn-group{
        margin:20px 0;
    }
    button{
        padding:12px 45px;
        font-size:20px;
        font-weight:bold;
        border:none;
        border-radius:10px;
        cursor:pointer;
        transition:0.2s;
    }
    #startBtn{
        background:#1890ff;
        color:#fff;
    }
    #stopBtn{
        background:#f5222d;
        color:#fff;
    }
    button:active{
        transform:scale(0.96);
    }

    /* 6个名字布局 */
    .name-box{
        max-width:650px;
        margin:30px auto;
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:20px;
    }
    .name-item{
        background:#fff;
        padding:25px 10px;
        font-size:22px;
        font-weight:bold;
        border-radius:12px;
        box-shadow:0 2px 8px rgba(0,0,0,0.1);
        transition:all 0.3s ease;
    }

    /* 高光发光 */
    .name-item.active{
        background:#ffec3d;
        box-shadow:0 0 25px #ffc107, 0 0 40px #ffb300;
        transform:scale(1.08);
    }

    /* 头像 */
    .avatar{
        width:180px;
        height:180px;
        margin:30px auto;
        border-radius:50%;
        border:6px solid #1890ff;
        overflow:hidden;
        display:none;
    }
    .avatar img{
        width:100%;
        height:100%;
        object-fit:cover;
    }
</style>
</head>
<body>

<!-- 开始按钮 -->
<div class="btn-group">
    <button id="startBtn">开始点名</button>
</div>

<!-- 6个名字 -->
<div class="name-box" id="nameBox"></div>

<!-- 头像显示 -->
<div class="avatar" id="avatar">
    <img id="avatarImg" src="">
</div>

<!-- 停止按钮 -->
<div class="btn-group">
    <button id="stopBtn">停止点名</button>
</div>

<!-- 本地音频标签（隐藏） -->
<audio id="audio"></audio>

<script>
    // 1. 3个学生名字（可修改）
    const students = ["康神","cxy","hanghang",];

    // 2. 本地头像路径（avatar文件夹）
    const avatarList = [
        "./avatar/1.jpg",
        "./avatar/2.jpg",
        "./avatar/3.jpg"
       ];

    // 3. 本地音乐路径（music文件夹，每个人不同音乐）
    const musicList = [
        "./music/1.mp3",
        "./music/2.mp3",
        "./music/3.mp3"
    ];

    let timer = null;
    let currentIndex = 0;
    const audio = document.getElementById("audio");

    const nameBox = document.getElementById("nameBox");
    const avatar = document.getElementById("avatar");
    const avatarImg = document.getElementById("avatarImg");

    // 渲染名字
    function renderNames(){
        nameBox.innerHTML = "";
        students.forEach((name, idx)=>{
            let div = document.createElement("div");
            div.className = "name-item";
            div.innerText = name;
            div.dataset.index = idx;
            nameBox.appendChild(div);
        });
    }

    // 随机滚动
    function startRoll(){
        document.querySelectorAll(".name-item").forEach(item => {
            item.classList.remove("active");
        });
        currentIndex = Math.floor(Math.random() * students.length);
        document.querySelector(`.name-item[data-index="${currentIndex}"]`).classList.add("active");
        avatar.style.display = "none";
    }

    // 开始
    startBtn.onclick = function(){
        if(timer) return;
        audio.pause(); // 开始时停止音乐
        timer = setInterval(startRoll, 120);
    }

    // 停止 → 显示头像 + 播放对应音乐
    stopBtn.onclick = function(){
        clearInterval(timer);
        timer = null;

        // 显示本地头像
        avatarImg.src = avatarList[currentIndex];
        avatar.style.display = "block";

        // 播放对应本地音乐
        audio.src = musicList[currentIndex];
        audio.play();
    }

    renderNames();
</script>
</body>
</html>
